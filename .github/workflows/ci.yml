name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pydantic-settings python-dotenv
          pip install scikit-learn numpy pandas nltk
          pip install matplotlib plotly seaborn loguru pyyaml tqdm httpx
          pip install streamlit pytest pytest-asyncio

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          nltk.download('punkt', quiet=True)
          nltk.download('stopwords', quiet=True)
          nltk.download('wordnet', quiet=True)
          nltk.download('averaged_perceptron_tagger', quiet=True)
          nltk.download('punkt_tab', quiet=True)
          "

      - name: Generate dataset
        run: python data/generate_dataset.py

      - name: Train baseline model
        run: python ml/training/train_baseline.py

      - name: Run core unit tests
        run: |
          python -m pytest tests/unit/test_text_cleaner.py -v --tb=short
          python -m pytest tests/unit/test_schemas.py -v --tb=short
          python -m pytest tests/unit/test_helpers.py -v --tb=short
          python -m pytest tests/unit/test_predictor.py -v --tb=short
          python -m pytest tests/unit/test_text_stats.py -v --tb=short
          python -m pytest tests/unit/test_confidence.py -v --tb=short
          python -m pytest tests/unit/test_constants.py -v --tb=short
          python -m pytest tests/unit/test_data_validator.py -v --tb=short
          python -m pytest tests/unit/test_normalizer.py -v --tb=short
          python -m pytest tests/unit/test_sentiment.py -v --tb=short
          python -m pytest tests/unit/test_priority_detector.py -v --tb=short
          python -m pytest tests/unit/test_input_validator.py -v --tb=short
          python -m pytest tests/unit/test_text_pipeline.py -v --tb=short
          python -m pytest tests/unit/test_rate_limiter.py -v --tb=short
          python -m pytest tests/unit/test_cache.py -v --tb=short
          python -m pytest tests/unit/test_augmenter.py -v --tb=short
          python -m pytest tests/unit/test_feature_flags.py -v --tb=short

      - name: Run evaluation
        run: python ml/evaluation/evaluator.py

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install pyflakes
      - name: Run pyflakes
        run: pyflakes app/ ml/ || true
