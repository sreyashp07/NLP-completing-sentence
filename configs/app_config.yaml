app:
  name: "CustomerIntent"
  version: "1.0.0"
  description: "AI-powered customer support intent classification and smart ticket routing"

api:
  host: "0.0.0.0"
  port: 8000
  prefix: "/api/v1"
  cors_origins:
    - "http://localhost:8501"
    - "http://localhost:3000"

preprocessing:
  remove_urls: true
  remove_emails: true
  handle_emojis: true
  lowercase: true
  remove_stopwords: false
  lemmatize: true
  min_text_length: 3
  max_text_length: 512

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} | {message}"
  file: "logs/app.log"
  rotation: "10 MB"
  retention: "30 days"
