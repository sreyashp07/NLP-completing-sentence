logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function}:{line} | {message}"
  file: logs/app.log
  rotation: 10 MB
  retention: 30 days
  compression: zip
  colorize: true

console:
  level: INFO
  colorize: true

file:
  level: DEBUG
  rotation: "10 MB"
  retention: "30 days"
