monitoring:
  enabled: true
  window_size: 100

  thresholds:
    max_avg_latency_ms: 500
    max_p95_latency_ms: 1000
    max_error_rate: 0.05
    min_confidence_avg: 0.60

  alerts:
    latency_breach: true
    error_rate_breach: true
    low_confidence_breach: false

  logging:
    log_every_n_predictions: 100
    log_slow_predictions_above_ms: 1000
    log_low_confidence_below: 0.5

  performance:
    rolling_window_size: 100
    report_interval_seconds: 300
