models:
  baseline:
    name: "TF-IDF + Logistic Regression"
    version: "v1.0"
    path: "ml/saved_models/baseline"
    vectorizer_file: "tfidf_vectorizer.pkl"
    classifier_file: "logistic_regression.pkl"
    max_features: 10000
    ngram_range: [1, 2]

  transformer:
    name: "DistilBERT Intent Classifier"
    version: "v1.0"
    path: "ml/saved_models/transformer"
    base_model: "distilbert-base-uncased"
    max_length: 128
    batch_size: 32

active_model: "baseline"
confidence_threshold: 0.6
