api:
  title: "CustomerIntent API"
  description: "AI-powered customer support intent classification and smart ticket routing"
  version: "1.0.0"
  docs_url: "/docs"
  redoc_url: "/redoc"

  cors:
    allow_origins:
      - "http://localhost:8501"
      - "http://localhost:3000"
      - "*"
    allow_methods: ["GET", "POST", "OPTIONS"]
    allow_headers: ["*"]
    allow_credentials: true

  rate_limiting:
    enabled: false
    max_requests_per_minute: 60
    max_batch_size: 100

  timeouts:
    prediction_ms: 5000
    batch_prediction_ms: 30000
    health_check_ms: 1000

  response:
    include_timestamp: true
    include_processing_time: true
    include_model_info: true
    max_keywords: 5
    top_n_intents: 3
