version: "3.9"

services:

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customerintent-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./ml/saved_models:/app/ml/saved_models
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Streamlit Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customerintent-frontend
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./ml/saved_models:/app/ml/saved_models
      - ./ml/evaluation:/app/ml/evaluation
    environment:
      - APP_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: customerintent-network
